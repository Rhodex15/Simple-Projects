<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="password.css">
</head>
<body>
    <form id="form">
        <h1>Random Password Generator:</h1>
        <label for="len">Length Of Password:</label>
        <input type="number" id="len">
        <h2>Pls select what is included in password:</h2>
        <br>
        <div>
            <input type="checkbox" name="options" id="LowerCase">
            <label for="Lower Case">Lowercase</label>
            <br>
            <input type="checkbox" name="options" id="UpperCase">
            <label for="Lower Case">Uppercase</label>
            <br>
            <input type="checkbox" name="options" id="Symbols">
            <label for="Lower Case">Symbols</label>
            <br>
            <input type="checkbox" name="options" id="Numbers">
            <label for="Lower Case">Numbers</label>
            <br>
            <br>
        </div>
        
        <button type="submit" id="submit">Submit</button>
        <p id="f-password"></p>
    </form>
    <script src="password.js"></script>
</body>
</html>
